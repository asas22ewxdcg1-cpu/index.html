<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>جمال تشطيب معماري</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Cairo', sans-serif;
    }

    body{
      background:linear-gradient(135deg,#f5f7fa,#e4e8f0);
      color:#222;
    }

    header{
      background:linear-gradient(90deg,#111,#2c2c2c);
      color:#fff;
      padding:25px;
      text-align:center;
    }

    nav{
      background:#1c1c1c;
      display:flex;
      justify-content:center;
      gap:15px;
      padding:10px;
      flex-wrap:wrap;
    }

    nav a{
      color:#fff;
      text-decoration:none;
      padding:8px 14px;
      border-radius:6px;
    }

    nav a:hover{
      background:#ff9800;
    }

    .hero{
      height:350px;
      background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
      url('https://images.unsplash.com/photo-1503387762-592deb58ef4e') center/cover;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      color:#fff;
      text-align:center;
    }

    section{
      padding:40px 20px;
      max-width:1000px;
      margin:auto;
    }

    .services{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:15px;
    }

    .card{
      background:#fff;
      padding:20px;
      border-radius:10px;
      box-shadow:0 5px 10px rgba(0,0,0,0.1);
      text-align:center;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:10px;
    }

    .gallery img{
      width:100%;
      border-radius:10px;
    }

    .btn{
      display:inline-block;
      margin-top:15px;
      padding:12px 20px;
      background:#25d366;
      color:#fff;
      text-decoration:none;
      border-radius:8px;
    }

    footer{
      background:#111;
      color:#fff;
      text-align:center;
      padding:15px;
      margin-top:20px;
    }
  </style>
</head>

<body>

<header>
  <h1>جمال تشطيب معماري</h1>
  <p>تشطيب – محارة – ديكورات حديثة</p>
</header>

<nav>
  <a href="#home">الرئيسية</a>
  <a href="#services">الخدمات</a>
  <a href="#gallery">أعمالنا</a>
  <a href="#contact">تواصل</a>
</nav>

<div class="hero" id="home">
  <h2>تشطيب احترافي بأعلى جودة</h2>
  <p>نحول شقتك إلى تحفة فنية</p>
</div>

<section id="services">
  <h2 style="text-align:center;">خدماتنا</h2>
  <div class="services">
    <div class="card">تشطيب شقق كامل</div>
    <div class="card">أعمال محارة</div>
    <div class="card">ديكورات حديثة</div>
    <div class="card">دهانات</div>
  </div>
</section>

<section id="gallery">
  <h2 style="text-align:center;">أعمالنا</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
    <img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c">
    <img src="https://images.unsplash.com/photo-1502005229762-cf1b2da7c5d6">
  </div>
</section>

<section id="contact" style="text-align:center;">
  <h2>تواصل معنا</h2>
  <p>للاستفسار عبر واتساب</p>
  <a class="btn" href="https://wa.me/201212734278" target="_blank">
    📞 واتساب
  </a>
</section>

<footer>
  <p>© 2026 جميع الحقوق محفوظة</p>
</footer>

</body>
</html>
